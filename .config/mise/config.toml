[tools]
ruby = "latest"
usage = "latest"
go = "latest"
fzf = "latest"
"go:github.com/charmbracelet/gum" = "latest"
tf-summarize = "latest"
"aqua:neovim/neovim" = "latest"
"asdf:mise-plugins/mise-eza" = "latest"
"asdf:mise-plugins/mise-tmux" = "latest"
"aqua:docker/cli" = "latest"
"aqua:docker/compose" = "latest"
lazygit = "latest"
lazydocker = "latest"
fd = "latest"
jq = "latest"
node = "latest"
rg = "latest"
air = "latest"
golangci-lint = "latest"
bat = "latest"
zoxide = "latest"
"go:github.com/ankitpokhrel/jira-cli/cmd/jira" = "latest"
postgres = "15"
rust = "latest"
rust-analyzer = "latest"
lua-language-server = "latest"
terraform = "latest"
yazi = "latest"
k9s = "latest"
yarn = "latest"
yq = "latest"
"go:github.com/joshmedeski/sesh/v2" = "latest"
"go:github.com/jorgerojas26/lazysql" = "latest"
"go:github.com/spf13/cobra-cli" = "latest"
"npm:markdownlint-cli" = "latest"
"npm:tree-sitter-cli" = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby", "node"]

[env]
TERM = "xterm-256color"
EDITOR = "nvim"
HOMEBREW_NO_ENV_HINTS = "true"
GOPRIVATE = "github.com/dailypay"
GONOSUMDB = "github.com/dailypay/*"
GOPROXY = "direct"
