set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

run '~/.tmux/plugins/tpm/tpm'

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

# Ensure window index numbers get reordered on delete.
set-option -g default-shell /usr/bin/zsh
set-option -g renumber-windows on

# split panes using | and -
bind-key | split-window -h
bind-key - split-window -v
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind & kill-pane
bind x kill-window

bind-key z resize-pane -Z

set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

set -g @vim_navigator_prefix_mapping_clear_screen ""

bind-key r source-file ~/.tmux.conf

set-option -sg escape-time 10
set -g allow-passthrough on

# theme for some reason needed on linux
# set -g default-terminal "xterm-256color"
# - ❌ ERROR $TERM should be "screen-256color", "tmux-256color", or "tmux-direct" in tmux. Colors might look wrong.
set -g default-terminal "tmux-direct"

set -ga terminal-overrides ',xterm-256color:Tc'
set -ga terminal-overrides ',xterm*:Ss=\E[%p1%d q:Se=\E[ q,xterm-kitty*:Ss=\E[%p1%d q:Se=\E[ q'

set-option -g cursor-style bar

unbind f
bind f display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

set -g status-left ""
set -g status-right ""
set -g status-justify centre
set -g status-position bottom

set -g window-status-separator ""
setw -g window-status-format "#[fg=#565c64] #I:#W "
setw -g window-status-current-format "#[fg=#61afef,bold] #I:#W#{?window_zoomed_flag,*,} #[default]"
setw -g status-style "fg=#abb2bf,bg=default"

bind-key "P" display-popup -E -w 80% -h 70% "sesh list | fzf \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}' \
    | xargs -r sesh connect"

bind-key "K" display-popup -E -w 40% "sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡' | xargs -r -I{} sesh connect \"{}\""
